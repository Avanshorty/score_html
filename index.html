  <body>
    <div>
      <table>
        <thead>
          <tr>
            <th style="width: 5%">ID</th>
            <th style="width: 30%">Name</th>
            <th>Midterm</th>
            <th>Final</th>
            <th>Total</th>
            <th>Grade</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
    <script>
      $(document).ready(function () {

        function getGrade (total) {
            if (total >= 80) return "A";
            if (total >= 70) return "B";
            if (total >= 60) return "C";
            if (total >= 50) return "D";
            return "F";
        }

        function updateRow(row, student) {
            const total = student.midterm + student.final;

            row.find(".midterm").text(student.midterm);
            row.find(".final").text(student.final);
            row.find(".total").text(total);
            row.find(".grade").text(getGrade(total));
        }

        function makeEditable(cell, student, field, row) {
            if (cell.find("input").length) return;
            const oldValue = student[field];
            const input = $("<input>", {
                type : "number",
                min : 0,
                max : 50,
                value : oldValue
            });
            cell.empty().append(input);
            input.focus().select();

            input.on("keydown", function (e) {
                if (e.key === "Enter") {
                    const value = parseInt($(this).val());
                    if (!isNaN(value) && value >= 0 && value <= 50) {
                        student[field] = value;
                    }
                    updateRow(row, student);
                }else if (e.key === "Escape") {
                    cell.text(oldValue);
                }
            });
            input.on("blur", function () {
                updateRow(row, student);
            });
        }

        students.forEach(function (student) {
            const total = student.midterm + student.final;

            const row = $(`
                <tr>
                    <td>${student.id}</td>
                    <td>${student.name}</td>
                    <td class="midterm">${student.midterm}</td>
                    <td class="final">${student.final}</td>
                    <td class="total">${total}</td>
                    <td class="grade">${getGrade(total)}</td> 
                </tr>  
            `);
            row .find(".midterm").click(function () {
                makeEditable($(this), student, "midterm", row);
            });
            row .find(".final").click(function () {
                makeEditable($(this), student, "final", row);
            });
            $("#table-body").append(row);
        });
      });
    </script>
